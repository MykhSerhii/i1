appId: com.ukraine.map
productName: Карта висот України

directories:
  output: dist-electron

# Файли що потрапляють в .exe (без data/ — вона лежить поруч з .exe)
files:
  - "**/*"
  - "!data/**"
  - "!scripts/**"
  - "!src/**"
  - "!tools/**"
  - "!logs/**"
  - "!.git/**"
  - "!dev.sh"
  - "!update.sh"
  - "!compile.sh"
  - "!README.md"

# Шрифти вкладаємо в resources/ всередині .exe
extraResources:
  - from: public/
    to: public/

win:
  target:
    - target: portable
      arch: [x64]
  artifactName: map.exe
  # Іконка (необов'язкова — якщо є build/icon.ico)
  # icon: build/icon.ico

portable:
  artifactName: map.exe
