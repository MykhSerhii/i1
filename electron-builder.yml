appId: com.ukraine.map
productName: Карта висот України
directories:
  output: dist-electron
win:
  target: nsis
  icon: build/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
files:
  - "**/*"
  - "!data/**"
  - "!scripts/**"
  - "!src/**"
  - "!.git/**"
extraResources:
  - from: public/
    to: public/
